criteria:

  # ─────────────────────────────────────────────────────────────
  # OUTDOOR / ACTIVE LIFESTYLE
  # Boulder, CO is a hiking/cycling/skiing/climbing town.
  # Score combines profile text signals and photo evidence.
  # ─────────────────────────────────────────────────────────────
  - id: outdoor_fit
    label: "Outdoor / Active Lifestyle"
    weight: 0.35
    type: score
    photo_weight: 0.5

    photo:
      description: |
        Rate outdoor/active lifestyle fit for Boulder, Colorado — a mountain town known
        for hiking, cycling, skiing, climbing, and an outdoorsy culture.

        HIGH (7-10): hiking trails, camping, outdoor rock climbing, skiing/snowboarding,
          mountain biking, trail running, indoor climbing gym with harness,
          competitive sport in action, multiple active photos
        MEDIUM (4-6): nature/park/beach settings, gym workouts, athletic gear in use,
          dance or gymnastics in practice, single outdoor activity photo
        LOW (1-3): selfie in front of a landmark without clear activity,
          sports uniform but no action visible
        NONE (0): posed indoor selfies, studio portraits, café/restaurant shots

        Return: { "score": <0-10 integer>, "evidence": ["up to 4 specific observations"] }

    profile_signals:
      raw_max: 18
      items:
        - type: array_match
          field: personalityTraits
          values: [Active, Adventurous, Athletic, Energetic]
          points_each: 2
          max: 8

        - type: array_match
          field: sports
          values:
            - Hiking
            - Running
            - Cycling
            - Skiing
            - Swimming
            - "Water sports"
            - Soccer
            - Basketball
            - Volleyball
            - Tennis
            - Skateboarding
            - "Roller skating"
            - "Horseback riding"
            - "Martial arts"
            - Gymnastics
            - Sailing
            - Fishing
            - Golf
            - Pickleball
          points_each: 1
          max: 4

        - type: array_match
          fields: [sports, social, relaxing]
          values: [Camping, Walking, Gardening]
          points_each: 1
          max: 2

        - type: bio_keywords
          fields: [aboutSelfAndInterests, WhyBecomeAuPair, otherInterests]
          keywords:
            - outdoor
            - nature
            - hik
            - mountain
            - gym
            - fitness
            - sport
            - active
            - adventur
            - walk
            - run
            - bik
            - cycl
            - camp
            - explor
            - travel
            - park
            - beach
            - wild
            - climb
            - ski
            - snowboard
            - surf
          points_each: 1
          max: 4

  # ─────────────────────────────────────────────────────────────
  # INFANT CARE EXPERIENCE
  # The host family has a 6-month-old baby.
  # Combines documented hours, stated preferences, bio text, and photos.
  # ─────────────────────────────────────────────────────────────
  - id: infant_care
    label: "Infant Care Experience"
    weight: 0.40
    type: score
    photo_weight: 0.25

    photo:
      description: |
        Look for infant/baby care signals. The host family has a 6-month-old.

        HIGH (8-10): clearly holding or actively caring for an infant/baby,
          comfortable and nurturing body language, eye contact with baby
        MEDIUM (5-7): photo with a baby/toddler nearby, warm visible interaction
        LOW (2-4): photo with young children (not infants), caring body language
        NONE (0-1): no children visible, or children only in background

        Return: { "score": <0-10 integer>, "evidence": ["up to 3 specific observations"] }

    profile_signals:
      raw_max: 8
      items:
        - type: array_sum
          field: childcareExperiences
          subfield: infantCareHours
          full_credit_at: 500
          max: 4

        - type: array_keyword_any
          field: childcareExperiences
          subfield: agesOfChildren
          keywords: [infant, newborn, baby, months]
          max: 1

        - type: array_keyword_any
          field: preferredAgeGroupToCareFor
          keywords: [infant, newborn, baby, months]
          max: 2

        - type: bio_keyword_any
          fields: [aboutChildcareExperience, aboutSelfAndInterests, WhyBecomeAuPair]
          keywords: [infant, newborn, baby, babies, months]
          max: 1

  # ─────────────────────────────────────────────────────────────
  # ENGLISH LEVEL
  # Must be Level 4 or above to communicate effectively.
  # ─────────────────────────────────────────────────────────────
  - id: english_level
    label: "English Level"
    weight: 0.20
    type: threshold

    threshold:
      field: "interview.englishProficiencyLevel"
      parse_regex: "level\\s*(\\d)"
      minimum: 4
      score_multiplier: 2    # Level 5 → 10, Level 4 → 8, Level 3 → 6, etc.
      max_score: 10

    flag_below_threshold: "English Level {value} — below required Level 4"

  # ─────────────────────────────────────────────────────────────
  # ALCOHOL IN PHOTOS
  # A penalty criterion — not a dealbreaker, but worth flagging.
  # ─────────────────────────────────────────────────────────────
  - id: alcohol
    label: "Alcohol in Photos"
    weight: -1
    type: penalty

    photo:
      description: |
        Look for alcohol visible in photos — beer, wine, spirits, cocktails, drinking
        at parties, or holding/drinking from bottles/glasses containing alcohol.
        Ignore photos where alcohol is incidentally in the background with no clear
        connection to the subject.

        Return: {
          "detected": <true/false>,
          "confidence": <"high" | "medium" | "low">,
          "note": "<one sentence describing what you see>"
        }

    trigger: "detected and confidence != low"
    flag_message: "Alcohol detected in photos ({confidence} confidence)"
